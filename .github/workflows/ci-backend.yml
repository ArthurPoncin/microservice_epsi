name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - "payment-service/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "payment-service/**"
      - ".github/workflows/ci-backend.yml"

defaults:
  run:
    working-directory: payment-service

jobs:
  lint:
    name: Lint (Checkstyle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check -B --no-transfer-progress

  test-unit:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: |
          ./mvnw test -B --no-transfer-progress \
            -Dtest="PaymentServiceTest" \
            -DfailIfNoTests=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: payment-service/target/surefire-reports/

  test-integration:
    name: Tests d'intégration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: paymentdb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run integration tests
        run: |
          ./mvnw test -B --no-transfer-progress \
            -Dtest="PaymentControllerTest,PaymentControllerWOMockTests" \
            -DfailIfNoTests=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: payment-service/target/surefire-reports/

  test-bdd:
    name: Tests BDD (Cucumber)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: paymentdb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run BDD tests
        run: |
          ./mvnw test -B --no-transfer-progress \
            -Dtest="RunCucumberTest" \
            -DfailIfNoTests=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-test-results
          path: payment-service/target/surefire-reports/

  build:
    name: Build JAR & Docker
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, test-bdd]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build JAR (sans tests)
        run: ./mvnw clean package -DskipTests -B --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: payment-service-jar
          path: payment-service/target/*.jar

      - name: Build Docker image
        run: docker build -t payment-service:${{ github.sha }} .
